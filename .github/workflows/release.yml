name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    name: Verify, publish, and release
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Audit dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enforce supply-chain policy
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - name: Verify tag matches Cargo package version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          test "$tag_version" = "$package_version"
      - name: Run release quality gates
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features
          RUSTDOCFLAGS='-D warnings' cargo doc --no-deps --all-features
          cargo package --locked
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
