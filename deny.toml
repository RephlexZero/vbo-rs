# Supply-chain policy for `cargo deny check`.
# Keep this file intentionally strict: registry dependencies only, with an
# explicit allow-list of licenses suitable for this MIT-licensed crate.

[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
# `paste` is an unmaintained macro-only transitive dependency of Parquet. There is no patched
# release or MSRV-compatible Parquet upgrade that removes it; review this exception on updates.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
